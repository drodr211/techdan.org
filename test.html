    let buffer = "";

    document.addEventListener("keydown", (e) => {
      // Only accept valid characters
      if (/[\=\-\d]/.test(e.key)) {
        buffer += e.key;
      }

      // When number is pressed → validate
      if (/\d/.test(e.key)) {
        const match = buffer.match(/^([=-])(\d)$/);

        if (match) {
          const sign = match[1];

          const contestant = "c" + match[2];
          const element = document.getElementById(contestant);
          const intvalue = parseInt(element.textContent, 10);
  
            if(sign == "=") {
                element.textContent = intvalue + 1;
            }
            if(sign == "-") {
                element.textContent = intvalue - 1;
            }
            document.getElementById("output").textContent =
            "success";

        } else {
          document.getElementById("output").textContent =
            "Invalid sequence";
        }

        buffer = ""; // reset
      }
    });
  </script>
